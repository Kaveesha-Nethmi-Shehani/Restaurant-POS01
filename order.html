<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Restaurant System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --dark-brown:#4E2A0E;
      --light-brown:#A0632A;
    }

    body { background:#430000; }

    /* navbar */
    #navbar {
      height:56px;
      background:linear-gradient(90deg,var(--dark-brown),var(--light-brown));
    }

    /* sidebar */
    #sidebar {
      top:56px;
      width:220px;
      height:100vh;
      position:fixed;
      background:linear-gradient(180deg,var(--light-brown),var(--dark-brown));
    }

    #sidebar a {
      color:#fff;
      display:block;
      padding:10px;
      text-decoration:none;
    }

    #sidebar a:hover { background:#6B3A14; }

    /* content */
    #content {
      margin-left:220px;
      margin-top:56px;
      padding:20px;
    }

    /* hide sections */
    .page { display:none; }
    .active-page { display:block; }

    form {
      background:#fff;
      padding:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav id="navbar" class="navbar fixed-top">
  <div class="container-fluid">
    <span class="navbar-brand text-white">🍽 Restaurant System</span>
  </div>
</nav>

<!-- Sidebar -->
<div id="sidebar">
  <a href="#" onclick="showPage('customerPage')">Customer</a>
  <a href="#" onclick="showPage('itemPage')">Item</a>
  <a href="#" onclick="showPage('orderPage')">Order</a>
</div>

<!-- Content -->
<div id="content">

  <!-- ================= CUSTOMER ================= -->
  <div id="customerPage" class="page active-page">
    <h3>Customer Management</h3>

    <input id="cName" class="form-control mb-2" placeholder="Name">
    <input id="cPhone" class="form-control mb-2" placeholder="Phone">
    <button class="btn btn-success" onclick="addCustomer()">Add</button>

    <table class="table mt-3">
      <thead><tr><th>Name</th><th>Phone</th></tr></thead>
      <tbody id="customerTable"></tbody>
    </table>
  </div>

  <!-- ================= ITEM ================= -->
  <div id="itemPage" class="page">
    <h3>Item Management</h3>

    <input id="iName" class="form-control mb-2" placeholder="Item Name">
    <input id="iPrice" class="form-control mb-2" placeholder="Price">
    <button class="btn btn-success" onclick="addItem()">Add</button>

    <table class="table mt-3">
      <thead><tr><th>Name</th><th>Price</th></tr></thead>
      <tbody id="itemTable"></tbody>
    </table>
  </div>

  <!-- ================= ORDER ================= -->
  <div id="orderPage" class="page">
    <h3>Place Order</h3>

    <select id="customerSelect" class="form-select mb-2"></select>
    <select id="itemSelect" class="form-select mb-2"></select>

    <input id="qty" class="form-control mb-2" placeholder="Qty">

    <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>

    <table class="table mt-3">
      <thead><tr><th>Item</th><th>Qty</th><th>Total</th></tr></thead>
      <tbody id="cartTable"></tbody>
    </table>

    <h4>Total: Rs <span id="total">0</span></h4>
  </div>

</div>

<script>

  // -------- Page Switch --------
  function showPage(pageId){
    $('.page').removeClass('active-page');
    $('#'+pageId).addClass('active-page');
  }

</script>

</body>
</html>
