<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>

    :root {
      --dark-brown:  #4E2A0E;
      --light-brown: #A0632A;
      --hover-brown: #6B3A14;

    }

    body {
      margin: 0;
      padding: 0;
      background: #430000;
    }

    /* Navbar - Dark Brown gradient */
    #navbar {
      z-index: 1050;
      height: 56px;
      background: linear-gradient(90deg, var(--dark-brown), var(--light-brown)) !important;
    }

    /* Sidebar - Light Brown to Dark Brown */
    #sidebar {
      top: 56px;
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      z-index: 1040;
      overflow-y: auto;
      background: linear-gradient(180deg, var(--light-brown), var(--dark-brown)) !important;
    }

    #sidebar .nav-link {
      color: #f5dfc0 !important;
      border-radius: 6px;
      transition: background 0.2s;
    }

    #sidebar .nav-link:hover,
    #sidebar .nav-link.active {
      background-color: var(--hover-brown) !important;
      color: #ffffff !important;
    }

    /* Content area - Light Blue */
    #content {
      margin-top: 56px;
      margin-left: 220px;
      padding: 2rem;
      min-height: calc(100vh - 56px);

    }

    /* Form card style */
    #content form {
      background: #ffffff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(78,42,14,0.13);
    }

    /* Table header */
    .table thead {
      background-color: var(--dark-brown) !important;
    }

    .table thead th {
      color: #fff !important;
    }

    .logo {
      width: 80px;
      margin: 1rem auto;
      display: block;
    }

    /* Clickable table rows */
    #customer_tbody tr {
      cursor: pointer;
    }

    #customer_tbody tr:hover {
      background-color: #bfdbfe !important;
    }

    #customer_tbody tr.selected-row {
      background-color: #93c5fd !important;
    }
  </style>

</head>
<body>

<header>
  <!-- FIX 4: navbar-brand and toggler button corrected -->
  <nav id="navbar" class="navbar navbar-expand-lg bg-primary position-fixed w-100 top-0">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="#">🍽 Restaurant</a>
    </div>
  </nav>
</header>

<!-- FIX 5: Sidebar is outside <main>, placed correctly as a sibling to #content -->
<aside id="sidebar" class="position-fixed bg-primary-subtle">
  <ul class="navbar-nav flex-column pe-2 pt-2">
    <img src="assets/logo.png">
    <li class="nav-item m-2">
      <a class="nav-link fw-semibold text-primary active" href="#">Customer Management</a>
    </li>
    <li class="nav-item m-2">
      <a class="nav-link" href="#">Order Management</a>
    </li>
    <li class="nav-item m-2">
      <a class="nav-link" href="#">Order View Management</a>
    </li>
  </ul>
</aside>

<section id="content">

  <!-- FIX 6: Alert box for messages -->
  <div id="alert_box" class="alert d-none" role="alert"></div>

  <form class="w-75 m-auto">
    <h1 class="text-center mb-4">Order Management</h1>
    <div class="mb-3">
      <label for="order_id_input" class="form-label">Order ID</label>
      <input type="number" class="form-control" id="order_id_input" placeholder="Auto-generated" readonly>
    </div>
    <div class="mb-3">
      <label for="customer_name_input" class="form-label">Customer Name</label>
      <input type="text" class="form-control" id="customer_name_input" placeholder="Enter full name">
    </div>
    <div class="mb-3">
      <label for="order_dish_input" class="form-label">Dish Name</label>
      <input type="text" class="form-control" id="order_dish_input" placeholder="Ex:Tacos">
    </div>
    <div class="mb-3">
      <label for="order_qty_input" class="form-label">Qty</label>
      <input type="text" class="form-control" id="order_qty_input" placeholder="Enter Qty">
    </div>
    <div class="mb-3">
      <label for="order_price_input" class="form-label">Price</label>
      <textarea class="form-control" id="order_price_input"  placeholder="Enter Price"></textarea>
    </div>
    <div class="text-end">
      <button type="button" id="order_save_btn" class="btn btn-success">Save</button>
      <button type="button" id="order_update_btn" class="btn btn-primary">Update</button>
      <button type="button" id="order_delete_btn" class="btn btn-danger">Delete</button>
      <button type="button" id="order_reset_btn" class="btn btn-info">Reset</button>
    </div>


  </form>

  <table class="table table-light table-striped mt-5">
    <thead class="table-primary">
    <tr>
      <th scope="col">Order ID</th>
      <th scope="col">Customer Name</th>
      <th scope="col">Dish Name</th>
      <th scope="col">Qty</th>
      <th scope="col">Price</th>
    </tr>
    </thead>
    <tbody id="customer_tbody">

    </tbody>
  </table>

</section>
