<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>

    :root {
      --dark-brown:  #4E2A0E;
      --light-brown: #A0632A;
      --hover-brown: #6B3A14;

    }

    body {
      margin: 0;
      padding: 0;
      background: #430000;
    }

    /* Navbar   */
    #navbar {
      z-index: 1050;
      height: 56px;
      background: linear-gradient(90deg, var(--dark-brown), var(--light-brown)) !important;
    }

    /* Sidebar  */
    #sidebar {
      top: 56px;
      left: 0;
      width: 220px;
      height: calc(100vh - 56px);
      z-index: 1040;
      overflow-y: auto;
      background: linear-gradient(180deg, var(--light-brown), var(--dark-brown)) !important;
    }

    #sidebar .nav-link {
      color: #f5dfc0 !important;
      border-radius: 6px;
      transition: background 0.2s;
    }

    #sidebar .nav-link:hover,
    #sidebar .nav-link.active {
      background-color: var(--hover-brown) !important;
      color: #ffffff !important;
    }

    /* Content area  */
    #content {
      margin-top: 56px;
      margin-left: 220px;
      padding: 2rem;
      min-height: calc(100vh - 56px);

    }

    /*   card */
    #content form {
      background: #f9fafb;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(78,42,14,0.13);
    }



    /* Clickable table rows */
    #item_tbody tr {
      cursor: pointer;
    }

    #item_tbody tr:hover {
      background-color: #bfdbfe !important;
    }

    #item_tbody tr.selected-row {
      background-color: #93c5fd !important;
    }
  </style>

</head>
<body>

<header>
  <!-- FIX 4: navbar-brand and toggler button corrected -->
  <nav id="navbar" class="navbar navbar-expand-lg bg-primary position-fixed w-100 top-0">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-bold" href="#">🍽 Restaurant</a>
    </div>
  </nav>
</header>

<!--   Sidebar  -->
<aside id="sidebar" class="position-fixed bg-primary-subtle">
  <ul class="navbar-nav flex-column pe-2 pt-2">
    <img src="assets/logo.png">
    <li class="nav-item m-2">
      <a class="nav-link fw-semibold text-primary active" href="customer.html">Customer Management</a>
    </li>
    <li class="nav-item m-2">
      <a class="nav-link" href="item.html">Item Management</a>
    </li>
    <li class="nav-item m-2">
      <a class="nav-link" href="#">Order View Management</a>
    </li>
  </ul>
</aside>

<section id="content">

  <!--     box   -->
  <div id="alert_box" class="alert d-none" role="alert"></div>

  <form class="w-75 m-auto">
    <h1 class="text-center mb-4">Item Management</h1>
    <div class="mb-3">
      <label for="item_id_input" class="form-label">ID</label>
      <input type="number" class="form-control" id="item_id_input" placeholder="Auto-generated" readonly>
    </div>
    <div class="mb-3">
      <label for="item_name_input" class="form-label">Food Name</label>
      <input type="text" class="form-control" id="item_name_input" placeholder="Enter food name">
    </div>
    <div class="mb-3">
      <label for="item_category_input" class="form-label">Category</label>

      <select class="form-control" id="item_category_input">
        <option value="">Select Category</option>
        <option value="food">Food</option>
        <option value="drinks">Drinks</option>
        <option value="dessert">Dessert</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="mb-3">
      <label for="item_nic_input" class="form-label">Ingredient</label>
      <input type="text" class="form-control" id="item_nic_input" placeholder="Enter Ingredients">
    </div>
    <div class="mb-3">
      <label for="item_phone_input" class="form-label">Qty</label>
      <input type="number" class="form-control" id="item_phone_input" placeholder="Enter Qty">
    </div>

    <div class="text-end">
      <button type="button" id="item_save_btn" class="btn btn-success">Save</button>
      <button type="button" id="item_update_btn" class="btn btn-primary">Update</button>
      <button type="button" id="item_delete_btn" class="btn btn-danger">Delete</button>
      <button type="button" id="item_reset_btn" class="btn btn-info">Reset</button>
    </div>
  </form>

  <table class="table table-light table-striped mt-5">
    <thead class="table-primary">
    <tr>
      <th scope="col">#ID</th>
      <th scope="col">Food Name</th>
      <th scope="col">Category</th>
      <th scope="col">Ingredient</th>
      <th scope="col">Qty</th>
    </tr>
    </thead>
    <tbody id="item_tbody">

    </tbody>
  </table>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="controller/itemController.js"></script>

</body>
</html>
