<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Order</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <style>
    body {
      background: #430000;
    }

    #content {
      margin-left: 220px;
      padding: 2rem;
    }

    .card {
      border-radius: 12px;
    }
  </style>
</head>

<body>

<section id="content">

  <h1 class="text-white text-center mb-4">🧾 Place Order</h1>

  <div class="row">

    <!-- Customer Select -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Customer</h5>

        <select id="customer_select" class="form-select mb-3">
          <option value="">Select Customer</option>
        </select>

        <input type="text" id="customer_name" class="form-control mb-2" placeholder="Name" readonly>
        <input type="text" id="customer_phone" class="form-control mb-2" placeholder="Phone" readonly>
      </div>
    </div>

    <!-- Item Select -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Item</h5>

        <select id="item_select" class="form-select mb-3">
          <option value="">Select Item</option>
        </select>

        <input type="text" id="item_price" class="form-control mb-2" placeholder="Price" readonly>
        <input type="number" id="item_qty" class="form-control mb-2" placeholder="Qty">

        <button id="add_to_cart_btn" class="btn btn-success w-100">Add to Cart</button>
      </div>
    </div>

    <!-- Order Summary -->
    <div class="col-md-4">
      <div class="card p-3">
        <h5>Order Summary</h5>

        <h4>Total: Rs. <span id="total">0.00</span></h4>

        <button id="place_order_btn" class="btn btn-primary w-100 mt-3">
          Place Order
        </button>
      </div>
    </div>

  </div>

  <!-- Cart Table -->
  <table class="table table-light table-striped mt-5">
    <thead class="table-dark">
    <tr>
      <th>Item</th>
      <th>Price</th>
      <th>Qty</th>
      <th>Total</th>
    </tr>
    </thead>
    <tbody id="cart_tbody"></tbody>
  </table>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="controller/placeOrderController.js"></script>


</body>
</html>
